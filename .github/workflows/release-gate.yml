# Release gate for create-evo-lite.
#
# STATUS: this gate runs on every PR and push to `main`. It is an INFORMATIONAL
# gate by default — promoting it to a REQUIRED status check for `main` is a
# documented manual repo-admin step (branch-protection settings; not enforceable
# from the CLI). See spec release-hardening-phase1 R4.
#
# The runtime test step restores the shipped runtime lockfile with `npm ci`
# (templates/runtime/package-lock.json), matching the deterministic install the
# initializer performs for consumers.
name: release-gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  consume:
    name: pack + consume on ${{ matrix.os }} / node ${{ matrix.node }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22, 24]
        exclude:
          # better-sqlite3 ships no node-20 win-x64 prebuild and the runner lacks a
          # node-gyp-detectable MSVC, so a build-tool-free install can't succeed on
          # Windows + Node 20. Node 20 stays covered on Linux; Windows starts at Node 22.
          - os: windows-latest
            node: 20
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Identity for scaffold commit
        shell: bash
        run: |
          git config --global user.email "release-gate@example.com"
          git config --global user.name "release-gate"

      - name: Install root deps (reproducible)
        run: npm ci

      - name: Runtime test suite
        # Restore the shipped runtime lockfile deterministically (matches RUNTIME_DEPENDENCIES).
        shell: bash
        run: |
          cp templates/runtime/package.json templates/runtime/package-lock.json .evo-lite/
          npm ci --prefix .evo-lite
          npm test

      - name: Pack the publishable tarball
        run: npm pack

      - name: Scaffold into an empty NON-Node project from the tarball
        shell: bash
        run: |
          mkdir -p ../consume-test
          TARBALL="$(ls create-evo-lite-*.tgz | head -n1)"
          echo "consuming $TARBALL"
          npm exec --yes --package "./$TARBALL" -- create-evo-lite ../consume-test --yes

      - name: Prove runtime readiness on the scaffolded project
        shell: bash
        run: |
          test ! -f ../consume-test/package.json  # consumer is a non-Node project
          node ../consume-test/.evo-lite/cli/memory.js verify
          node ../consume-test/.evo-lite/cli/mcp-validate.js ../consume-test
