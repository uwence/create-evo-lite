# Evo-Lite team-mode auto-archive (P5)
#
# Triggered on the default branch when a pull request is merged. Builds an
# archive payload from the PR title + merge commit + a truncated `git log
# --stat`, runs it through the local Evo-Lite safety scanner (P1), and opens
# a follow-up PR that adds the new files under `.evo-lite/raw_memory/` and
# `.evo-lite/vect_memory/`.
#
# This workflow ships disabled-by-default. To enable it, copy this file into
# your repository's `.github/workflows/` (the create-evo-lite initializer
# does this automatically when it doesn't already exist), then ensure the
# repo allows GitHub Actions to create pull requests in
# Settings -> Actions -> General -> Workflow permissions.

name: Evo-Lite Auto Archive

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  archive:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == github.event.repository.default_branch
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect Evo-Lite runtime
        id: detect
        run: |
          if [ -d ".evo-lite/cli" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::No .evo-lite/cli directory found; skipping auto-archive."
          fi

      - name: Install Evo-Lite CLI dependencies
        if: steps.detect.outputs.present == 'true'
        run: |
          cd .evo-lite
          npm install --ignore-scripts --no-audit --no-fund \
            better-sqlite3 sqlite-vec @xenova/transformers tar || true

      - name: Build archive payload
        if: steps.detect.outputs.present == 'true'
        id: payload
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MAX_BYTES: '4096'
        run: |
          set -e
          DIFF_STAT=$(git log --stat --pretty=format:'%h %s' "$PR_BASE_SHA..$PR_HEAD_SHA" 2>/dev/null | head -c "$MAX_BYTES" || true)
          {
            echo "[PR #$PR_NUMBER] $PR_TITLE"
            echo "merge: $PR_MERGE_SHA"
            echo "author: $PR_AUTHOR"
            echo
            echo "Diff summary (truncated to $MAX_BYTES bytes):"
            echo "$DIFF_STAT"
          } > /tmp/evo-lite-archive-payload.txt
          echo "payload_path=/tmp/evo-lite-archive-payload.txt" >> "$GITHUB_OUTPUT"

      - name: Run safety scan + archive
        if: steps.detect.outputs.present == 'true'
        env:
          PAYLOAD_PATH: ${{ steps.payload.outputs.payload_path }}
        run: |
          set -e
          # The safety scanner from P1 runs implicitly inside `archive`.
          # If a secret is detected this step will fail with a clear message,
          # but `continue-on-error: true` on the job keeps it from blocking the merge.
          PAYLOAD=$(cat "$PAYLOAD_PATH")
          node .evo-lite/cli/memory.js archive "$PAYLOAD" --type=note

      - name: Open follow-up PR with archive contents
        if: steps.detect.outputs.present == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(evo-lite): auto-archive merged PR #${{ github.event.pull_request.number }}"
          title: "chore(evo-lite): auto-archive PR #${{ github.event.pull_request.number }}"
          body: |
            Auto-generated by `evo-lite-archive.yml` after merging
            #${{ github.event.pull_request.number }}.

            This PR adds the resulting `.evo-lite/raw_memory/` and
            `.evo-lite/vect_memory/` files so the team's long-term archive
            stays in sync with the default branch — without depending on any
            individual developer's local IDE session.
          branch: evo-lite/auto-archive-${{ github.event.pull_request.number }}
          add-paths: |
            .evo-lite/raw_memory/**
            .evo-lite/vect_memory/**
          delete-branch: true
